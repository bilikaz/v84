# Isolated test stack — completely separate from dev.
# No shared volumes, no shared network, no shared ports.
# `docker compose up -d --build --wait` starts fresh every time.
# `docker compose down -v` tears it all down including data.

# [v84-1-2][ops:infra]
services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      - test
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    networks:
      - test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    networks:
      - test

  api:
    build:
      context: ../../
      dockerfile: docker/test/api.Dockerfile
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../brand:/app/brand:ro
      - /app/apps/api/node_modules
    networks:
      - test
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - .env
    # Test-only startup: boot the app (runs migrations via migrationsRun:true),
    # wait for /health to respond, then run `pnpm seed` so admin@admin.localhost
    # exists for e2e. App stays running after seed completes.
    command:
      - sh
      - -c
      - |
        pnpm --filter @v84/api start:dev &
        APP=$$!
        until node -e "require('http').get('http://localhost:${API_PORT}/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" 2>/dev/null; do sleep 1; done
        pnpm --filter @v84/api seed
        touch /tmp/seeded
        wait $$APP
    healthcheck:
      # Healthy means: app responds AND seed has completed.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${API_PORT}/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\" && test -f /tmp/seeded"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  web:
    build:
      context: ../../
      dockerfile: docker/test/web.Dockerfile
    volumes:
      - ../../apps/web:/app/apps/web
      - ../../brand:/app/brand:ro
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    networks:
      - test
    depends_on:
      - api
    env_file:
      - .env

  e2e:
    build:
      context: ../../
      dockerfile: docker/test/e2e.Dockerfile
    volumes:
      - ../../e2e:/app/e2e
      - ../../playwright.config.ts:/app/playwright.config.ts
      - ../../brand:/app/brand:ro
      # Playwright wipes its outputDir (/app/test-results) and its html-report
      # folder (/app/playwright-report) at the start of every run. Mount each
      # into a dedicated subdirectory under the host's test-results/ so the
      # cleanup never touches the log files our runner writes at the root.
      - ../../test-results/e2e_tmp:/app/test-results
      - ../../test-results/e2e_report:/app/playwright-report
    environment:
      E2E_BASE_URL: ${WEB_URL}
      E2E_API_URL: ${API_URL}
      E2E_MAILPIT_URL: http://${MAIL_HOST}:${MAIL_HTTP_PORT}
    env_file:
      - .env
    networks:
      - test
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
      mailpit:
        condition: service_started
    profiles:
      - e2e

networks:
  test:
    driver: bridge
