# [v84-1-2][ops:infra]
services:
  # [v84-1-2-1][ops:infra] Reverse proxy
  traefik:
    image: traefik:v3.6.12
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=dev"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

  # [v84-1-2-2][ops:infra] MariaDB database
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - dev
    healthcheck:
      test:  ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  # [v84-1-2-2][ops:infra] Database admin UI
  adminer:
    image: adminer:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`adminer.localhost`)"
      - "traefik.http.routers.adminer.entrypoints=web"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
    networks:
      - dev
    depends_on:
      db:
        condition: service_healthy

  # [v84-1-2-4][ops:infra] Local SMTP catcher (web UI at http://mail.localhost)
  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mail.localhost`)"
      - "traefik.http.routers.mailpit.entrypoints=web"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"
    networks:
      - dev

  # [v84-1-2-3][ops:infra] Redis for sessions and token storage
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # [v84-1-3][ops:infra] NestJS API
  api:
    build:
      context: ../../
      dockerfile: docker/dev/api.Dockerfile
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../brand:/app/brand:ro
      - /app/apps/api/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=${API_PORT}"
    networks:
      - dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - .env

  # [v84-1-4][ops:infra] Next.js web app
  web:
    build:
      context: ../../
      dockerfile: docker/dev/web.Dockerfile
    volumes:
      - ../../apps/web:/app/apps/web
      - ../../brand:/app/brand:ro
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"   # exposed for Google OAuth — Google only accepts http://localhost:PORT as a loopback origin, not custom subdomains
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`web.localhost`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=${WEB_PORT}"
    networks:
      - dev
    env_file:
      - .env

  # [v84-1-5][ops:infra] Storybook — see apps/storybook/README.md
  storybook:
    build:
      context: ../../
      dockerfile: docker/dev/storybook.Dockerfile
    environment:
      BROWSER: "none"
      CI: "true"
    volumes:
      - ../../apps/storybook:/app/apps/storybook
      - ../../apps/web/src/ui:/app/apps/web/src/ui:ro
      - ../../apps/api/src/templates:/app/apps/api/src/templates:ro
      - ../../brand:/app/brand:ro
      - /app/apps/storybook/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storybook.rule=Host(`storybook.localhost`)"
      - "traefik.http.routers.storybook.entrypoints=web"
      - "traefik.http.services.storybook.loadbalancer.server.port=6006"
    networks:
      - dev
    ports:
      - "6006:6006"
    env_file:
      - .env

volumes:
  db-data:
  redis-data:

networks:
  dev:
    driver: bridge
    name: dev   # explicit name so Traefik's "network: pickme-dev" matches
