name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Web unit tests (BFF / lib) ───────────────────────────────────────────
  # No containers needed — runs natively on the runner in < 1s.
  test-web:
    name: Web (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:web

  # ── API integration tests (real MariaDB + Redis + Mailpit) ────────────────
  # Uses the isolated test stack (docker/test/docker-compose.yml).
  # All env vars are in the compose file — no .env needed.
  test-api:
    name: API (integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/test
    steps:
      - uses: actions/checkout@v4

      - name: Build and start test containers
        run: docker compose up -d --build db redis mailpit api --wait

      - name: Run API integration tests
        run: docker compose exec -T -w /app/apps/api api pnpm test

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=50 api db redis

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Playwright e2e (real browser against full stack) ──────────────────────
  # Uses the same isolated test stack with the e2e profile.
  test-e2e:
    name: E2E (playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/test
    steps:
      - uses: actions/checkout@v4

      - name: Build and start full test stack
        run: docker compose --profile e2e up -d --build --wait

      - name: Run Playwright e2e tests
        run: docker compose --profile e2e run --rm e2e

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=50 web api db

      - name: Tear down
        if: always()
        run: docker compose --profile e2e down -v
